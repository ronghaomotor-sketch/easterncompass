<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Eastern Compass</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Initialize Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.open("login");
        }
      });
      
      // Handle password recovery and email confirmation
      window.netlifyIdentity.on("init", () => {
        const hash = document.location.hash;
        if (hash && (hash.includes("confirmation_token") || hash.includes("recovery_token") || hash.includes("invite_token"))) {
          // Open the identity widget to handle the token
          window.netlifyIdentity.open();
        }
      });
    }
  </script>
</body>
</html>
